<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpeakIt — Local TTS</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --text: #f0ede6;
      --muted: #666;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 680px;
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    header { margin-bottom: 3rem; }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .logo span { font-style: italic; color: var(--text); }
    .tagline {
      margin-top: 0.5rem; color: var(--muted);
      font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
    }
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      line-height: 1.7;
      padding: 1rem;
      resize: vertical;
      min-height: 180px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }
    .char-count { font-size: 0.65rem; color: var(--muted); text-align: right; margin-top: 0.4rem; }

    .controls {
      margin-top: 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .control-group { display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    .range-val { font-size: 0.7rem; color: var(--accent); font-weight: 500; }
    select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 0.5rem 0.6rem;
      border-radius: 4px;
      outline: none;
      cursor: pointer;
      width: 100%;
    }
    .actions {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .btn-speak {
      flex: 1;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 4px;
      padding: 0.85rem 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-speak:hover { opacity: 0.88; }
    .btn-speak:active { transform: scale(0.98); }
    .btn-speak:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-stop {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 0.85rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-stop:hover { border-color: #ff5555; color: #ff5555; }

    /* Audio player */
    .audio-wrap {
      margin-top: 1.5rem;
      display: none;
    }
    .audio-wrap.visible { display: block; }
    audio {
      width: 100%;
      filter: invert(1) hue-rotate(180deg);
      border-radius: 4px;
    }

    /* Waveform */
    .waveform {
      margin-top: 1rem;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .waveform.active { opacity: 1; }
    .bar {
      width: 3px; background: var(--accent); border-radius: 99px;
      height: 4px; animation: wave 1s ease-in-out infinite;
    }
    .bar:nth-child(1)  { animation-delay: 0.00s; }
    .bar:nth-child(2)  { animation-delay: 0.07s; }
    .bar:nth-child(3)  { animation-delay: 0.14s; }
    .bar:nth-child(4)  { animation-delay: 0.21s; }
    .bar:nth-child(5)  { animation-delay: 0.28s; }
    .bar:nth-child(6)  { animation-delay: 0.35s; }
    .bar:nth-child(7)  { animation-delay: 0.42s; }
    .bar:nth-child(8)  { animation-delay: 0.49s; }
    .bar:nth-child(9)  { animation-delay: 0.56s; }
    .bar:nth-child(10) { animation-delay: 0.63s; }
    .bar:nth-child(11) { animation-delay: 0.56s; }
    .bar:nth-child(12) { animation-delay: 0.49s; }
    .bar:nth-child(13) { animation-delay: 0.42s; }
    .bar:nth-child(14) { animation-delay: 0.35s; }
    .bar:nth-child(15) { animation-delay: 0.28s; }
    @keyframes wave {
      0%, 100% { height: 4px; }
      50% { height: 28px; }
    }

    .status {
      font-size: 0.7rem; color: var(--muted);
      letter-spacing: 0.06em; text-align: center;
      margin-top: 0.75rem; min-height: 1rem;
    }
    .status.generating { color: var(--accent); }
    .status.error { color: #ff5555; }

    .badge {
      display: inline-block;
      background: var(--accent-dim, rgba(232,255,71,0.1));
      color: var(--accent);
      border: 1px solid rgba(232,255,71,0.3);
      border-radius: 99px;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      padding: 0.15rem 0.6rem;
      margin-left: 0.5rem;
      vertical-align: middle;
      text-transform: uppercase;
    }

    footer { margin-top: 2rem; font-size: 0.65rem; color: #333; letter-spacing: 0.08em; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Speak<span>It</span> <span class="badge">Kokoro</span></div>
    <div class="tagline">Local neural text-to-speech · GPU accelerated</div>
  </header>

  <div class="card">
    <textarea id="textInput" placeholder="Paste or type any text here and hit Generate...&#10;&#10;Powered by Kokoro TTS — running locally on your GPU."></textarea>
    <div class="char-count"><span id="charCount">0</span> characters</div>

    <div class="controls">
      <div class="control-group" style="grid-column: span 2;">
        <label>Voice</label>
        <select id="voiceSelect">
          <option value="">Loading voices...</option>
        </select>
      </div>
      <div class="control-group">
        <label>Speed — <span class="range-val" id="speedVal">1.0x</span></label>
        <input type="range" id="speedRange" min="0.5" max="2" step="0.05" value="1.0"/>
      </div>
      <div class="control-group" style="display:flex; flex-direction:column; justify-content:flex-end;">
        <!-- spacer -->
      </div>
    </div>

    <div class="actions">
      <button class="btn-speak" id="speakBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        Generate Speech
      </button>
      <button class="btn-stop" id="stopBtn">■ Stop</button>
    </div>

    <div class="waveform" id="waveform">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <div class="audio-wrap" id="audioWrap">
      <audio id="audioPlayer" controls></audio>
    </div>

    <div class="status" id="status">Ready.</div>
  </div>

  <footer>SPEAKIT · KOKORO TTS · LOCAL GPU · NO API KEYS</footer>
</div>

<script>
  const textInput  = document.getElementById('textInput');
  const voiceSelect = document.getElementById('voiceSelect');
  const speedRange  = document.getElementById('speedRange');
  const speakBtn    = document.getElementById('speakBtn');
  const stopBtn     = document.getElementById('stopBtn');
  const waveform    = document.getElementById('waveform');
  const audioWrap   = document.getElementById('audioWrap');
  const audioPlayer = document.getElementById('audioPlayer');
  const status      = document.getElementById('status');
  const charCount   = document.getElementById('charCount');

  let abortController = null;

  // Load voices from backend
  async function loadVoices() {
    try {
      const res = await fetch('/voices');
      const voices = await res.json();
      voiceSelect.innerHTML = '';
      for (const [id, label] of Object.entries(voices)) {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = label;
        voiceSelect.appendChild(opt);
      }
    } catch(e) {
      setStatus('Could not load voices — is the server running?', 'error');
    }
  }
  loadVoices();

  textInput.addEventListener('input', () => charCount.textContent = textInput.value.length);
  speedRange.addEventListener('input', () => {
    document.getElementById('speedVal').textContent = parseFloat(speedRange.value).toFixed(2) + 'x';
  });

  function setStatus(msg, type = '') {
    status.textContent = msg;
    status.className = 'status' + (type ? ' ' + type : '');
  }

  speakBtn.addEventListener('click', async () => {
    const text = textInput.value.trim();
    if (!text) { setStatus('⚠ Please enter some text first.'); return; }

    abortController = new AbortController();
    speakBtn.disabled = true;
    waveform.classList.add('active');
    audioWrap.classList.remove('visible');
    setStatus('Generating audio...', 'generating');

    try {
      const res = await fetch('/speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text,
          voice: voiceSelect.value,
          speed: parseFloat(speedRange.value),
        }),
        signal: abortController.signal,
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Server error');
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      audioPlayer.src = url;
      audioWrap.classList.add('visible');
      audioPlayer.play();
      setStatus('Done! Playing audio.');
    } catch(e) {
      if (e.name === 'AbortError') {
        setStatus('Cancelled.');
      } else {
        setStatus('Error: ' + e.message, 'error');
      }
    } finally {
      speakBtn.disabled = false;
      waveform.classList.remove('active');
      abortController = null;
    }
  });

  stopBtn.addEventListener('click', () => {
    if (abortController) abortController.abort();
    audioPlayer.pause();
    audioPlayer.currentTime = 0;
    waveform.classList.remove('active');
    speakBtn.disabled = false;
    setStatus('Stopped.');
  });
</script>
</body>
</html>
